services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: seongjang
      POSTGRES_PASSWORD: seongjang_dev
      POSTGRES_DB: seongjang
    ports:
      - "5432:5432"
    volumes:
      - seongjang_pgdata:/var/lib/postgresql/data

volumes:
  seongjang_pgdata:
