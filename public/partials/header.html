<!--
  공통 상단 헤더 파셜.
  각 페이지에서 fetch로 로드한 뒤 #header에 넣고, 부모의 className( feed / meditation / study / group )을 header에 적용해 테마 색 구분.
-->
<link rel="stylesheet" href="/css/mainheader.css">

<header id="main-header">
  <a href="/main" class="logo">
    <img src="/images/logo.png" alt="성경나눔장소 로고">
  </a>
  <a href="/main" class="logo_title">성경나눔장소</a>

  <div class="header-left">
    <a href="/main" class="nav-icon">
      <img src="/images/icon-feed.png" alt="홈">
    </a>
    <a href="/meditation" class="nav-icon">
      <img src="/images/icon-meditation.png" alt="말씀묵상">
    </a>
    <a href="/study" class="nav-icon">
      <img src="/images/icon-study.png" alt="성경연구">
    </a>
    <a href="/group/mygroups" id="groupNavLink" class="nav-icon">
      <img src="/images/icon-group.png" alt="소그룹">
    </a>
    <!-- 관리자만 보이게: JS에서 role === 'admin'일 때 display: inline-flex -->
    <a href="/admin" id="adminTab" style="display:none;">관리자</a>
  </div>

  <nav class="header-right">
    <span id="userName"></span>
    <button id="logoutBtn">로그아웃</button>
  </nav>
</header>
