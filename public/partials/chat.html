<!-- 채팅: 오른쪽 목록 패널 + 접기 아이콘. 채팅창 컨테이너는 JS에서 동적 생성 -->
<div id="chat-wrap">
  <button type="button" id="chat-toggle" class="chat-toggle" aria-label="채팅 열기">💬</button>
  <div id="chat-panel" class="chat-panel">
    <div class="chat-panel-header">
      <input type="text" id="chat-search" class="chat-search" placeholder="사용자 검색" autocomplete="off" />
    </div>
    <div id="chat-search-results" class="chat-search-results" style="display:none;"></div>
    <div id="chat-room-list" class="chat-room-list"></div>
  </div>
</div>
<div id="chat-windows-container"></div>
