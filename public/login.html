<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인 | 성장</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 로그인 폼: 이메일/비밀번호 제출 → /login POST, 성공 시 /main 이동 (auth.js에서 처리) -->
  <div class="auth-wrap">
    <h1 class="auth-title">성경나눔장소</h1>

    <div class="auth-card">
      <h2>로그인</h2>

      <form id="loginForm">
        <input type="email" id="email" placeholder="이메일" required /><br />
        <input type="password" id="password" placeholder="비밀번호" required /><br />
        <button type="submit">로그인</button>
      </form>

      <p class="auth-link">
        <a href="/register.html">회원가입</a>
      </p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
