<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/mypage.css">
  <link rel="stylesheet" href="/css/feed.css">
  <link rel="stylesheet" href="/css/chat.css">
  <title>성장 | 소그룹 마이페이지</title>
</head>
<body>
  <script src="/js/group-last-path.js"></script>
  <!-- 소그룹 컨텍스트: 헤더에 group 클래스로 색 적용 -->
  <div id="header" class="group"></div>

  <div id="pjax-container">
  <main class="mypage-wrap">
    <!-- 소그룹 전용 서브 내비: 마이페이지 / 내 소그룹 링크 -->
    <div id="groupSubNav"></div>

    <section class="mypage-card">
      <div class="profile-top">
        <div class="profile-img">
          <img src="/images/default-profile.png" alt="프로필" />
        </div>
        <div class="profile-meta">
          <div class="username" id="profileName">사용자명</div>
          <div class="status" id="profileStatus">상태메세지</div>
        </div>
        <div class="profile-actions">
          <button type="button" id="openProfileEdit">프로필 수정</button>
        </div>
      </div>

      <div class="tabbar">
        <button class="active" id="tabPosts">내 게시글</button>
        <button id="tabCalendar">달력</button>
      </div>

      <div id="panelPosts">
        <div class="grid" id="myPostsGrid">불러오는 중...</div>
      </div>

      <div id="panelCalendar" style="display:none;">
        <div class="calendar-wrap">
          <div class="calendar-left">
            <div class="calendar-toolbar">
              <button type="button" id="calPrev" class="cal-btn">‹</button>
              <div id="calTitle" class="cal-title">YYYY.MM</div>
              <button type="button" id="calNext" class="cal-btn">›</button>
              <div style="flex:1"></div>
              <button type="button" id="calToday" class="cal-btn">오늘</button>
              <button type="button" id="calAdd" class="cal-btn primary">일정 추가</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
          </div>
          <div class="calendar-right">
            <div class="day-header">
              <div id="dayTitle" class="day-title">선택한 날짜</div>
              <span class="pill" id="dayCount">0개</span>
            </div>
            <div id="dayList" class="day-list"></div>
            <div class="hint">관리자가 설정한 일정은 모두에게 보여요. (내 일정은 나만)</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    if (window.GroupLastPath) {
      GroupLastPath.remember();
      GroupLastPath.apply();
    }
    // 헤더 로드 (PJAX 시 이미 있으면 스킵)
    if (!document.querySelector('#header header')) {
      fetch('/partials/header.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('header').innerHTML = html;
          const header = document.querySelector('#header header');
          if (header) header.className = document.getElementById('header').className;
          if (window.GroupLastPath) GroupLastPath.apply();
        });
    }

    fetch('/api/me')
      .then(res => res.json())
      .then(user => {
        if (user) {
          const el = document.getElementById('userName');
          if (el) el.innerText = user.username + '님';
        }
        if (user && user.role === 'admin') {
          const adminTab = document.getElementById('adminTab');
          if (adminTab) adminTab.style.display = 'inline-flex';
        }
      });

    document.addEventListener('click', (e) => {
      if (e.target.id === 'logoutBtn') {
        fetch('/logout', { method: 'POST' })
          .then(() => location.href = '/login.html');
      }
    });
  </script>

  <!-- 서브 내비 로드 후, 현재 페이지(mypage) 링크에 active 클래스 -->
  <script>
    fetch('/partials/group_subnav.html')
      .then(r => r.text())
      .then(html => {
        const container = document.getElementById('groupSubNav');
        container.innerHTML = html;
        container.querySelector('[data-page="mygroups"]')?.classList.add('active');

        // left subnav layout + toggle
        document.body.classList.add('has-group-subnav');
        const subnav = container.querySelector('#group-subnav');
        const toggle = container.querySelector('#groupSubnavToggle');
        const groupSubnavStorageKey = 'group.subnav.collapsed';
        function setCollapsed(isCollapsed) {
          if (!subnav) return;
          subnav.classList.toggle('collapsed', isCollapsed);
          try {
            localStorage.setItem(groupSubnavStorageKey, isCollapsed ? '1' : '0');
          } catch (_) {}
        }
        // restore collapsed/open state
        let initialCollapsed = false;
        try {
          initialCollapsed = localStorage.getItem(groupSubnavStorageKey) === '1';
        } catch (_) {}
        setCollapsed(initialCollapsed);
        if (toggle) {
          toggle.addEventListener('click', function() {
            setCollapsed(!subnav.classList.contains('collapsed'));
          });
        }

        document.dispatchEvent(new CustomEvent('groupSubnavMounted', { detail: { container } }));
      });
  </script>

  <script>
    (function() {
      const grid = document.getElementById('myPostsGrid');
      if (!grid) return console.error('myPostsGrid 없음');

      let cachedPosts = [];

      function escapeHtml(str) {
        return String(str == null ? '' : str)
          .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;').replaceAll("'", '&#039;');
      }

      // 메인 피드와 동일: 게시글 상세 + 댓글 모달
      let currentPostId = null;
      const $ = (id) => document.getElementById(id);

      function openPostDetailModal(post, showEditButton) {
        currentPostId = post._id;
        const imgs = (Array.isArray(post.imageUrls) && post.imageUrls.length) ? post.imageUrls : (post.imageUrl ? [post.imageUrl] : []);
        const body = $('postDetailBody');
        body.innerHTML = `
          <article class="feed-post" style="aspect-ratio:auto; overflow:visible;">
            <div class="post-header">
              <div><b class="post-title">${escapeHtml(post.title || '')}</b></div>
              <div><small class="post-meta">${escapeHtml(post.authorName || '')} · ${new Date(post.createdAt).toLocaleString()}</small></div>
            </div>
            ${post.bibleRef ? `<div class="post-bible"><small>📖 ${escapeHtml(post.bibleRef)}</small></div>` : ''}
            ${imgs.length ? `<div class="post-media"><div class="thumb"><img src="${imgs[0]}" alt="이미지" style="max-height:300px;"></div></div>` : ''}
            <div class="post-content" style="max-height:none; overflow:visible; white-space:pre-wrap;">${escapeHtml(post.content || '')}</div>
            ${showEditButton ? `<div style="text-align:right; margin-top:12px;"><button type="button" class="edit-btn post-detail-edit" data-id="${post._id}">수정</button></div>` : ''}
          </article>
        `;
        $('postDetailModal').classList.add('show');
        loadCommentsMypage(currentPostId);
      }

      function closePostDetailModal() {
        $('postDetailModal').classList.remove('show');
        currentPostId = null;
        if ($('commentInputMypage')) $('commentInputMypage').value = '';
      }

      function loadCommentsMypage(postId) {
        fetch('/api/posts/' + postId + '/comments')
          .then(res => res.json())
          .then(comments => {
            const list = $('commentListMypage');
            const countEl = $('commentCountMypage');
            if (countEl) countEl.textContent = comments.length;
            if (!list) return;
            if (!comments.length) {
              list.innerHTML = '<p style="color:#999; font-size:13px;">아직 댓글이 없어요.</p>';
              return;
            }
            list.innerHTML = comments.map(c => `
              <div class="comment-item">
                <span class="comment-author">${escapeHtml(c.authorName || '')}</span>
                <span class="comment-time">${new Date(c.createdAt).toLocaleString()}</span>
                <div style="margin-top:4px;">${escapeHtml(c.content || '')}</div>
              </div>
            `).join('');
          })
          .catch(function() {
            if ($('commentCountMypage')) $('commentCountMypage').textContent = '0';
            if ($('commentListMypage')) $('commentListMypage').innerHTML = '';
          });
      }

      if ($('postDetailModalClose')) $('postDetailModalClose').addEventListener('click', closePostDetailModal);
      if ($('postDetailModalX')) $('postDetailModalX').addEventListener('click', closePostDetailModal);
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closePostDetailModal();
      });

      function submitCommentMypage() {
        if (!currentPostId) return;
        var content = ($('commentInputMypage') && $('commentInputMypage').value || '').trim();
        if (!content) return;
        fetch('/api/posts/' + currentPostId + '/comments', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: content })
        })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.ok) {
              if ($('commentInputMypage')) $('commentInputMypage').value = '';
              loadCommentsMypage(currentPostId);
            }
          });
      }
      if ($('commentSubmitMypage')) $('commentSubmitMypage').addEventListener('click', submitCommentMypage);
      if ($('commentInputMypage')) {
        $('commentInputMypage').addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            submitCommentMypage();
          }
        });
      }

      document.addEventListener('click', function(e) {
        if (e.target.classList.contains('post-detail-edit') && e.target.dataset.id) {
          window.location.href = '/meditation?edit=' + e.target.dataset.id;
        }
      });

      grid.addEventListener('click', function(e) {
        const item = e.target.closest('.grid-item');
        if (!item) return;
        const id = item.dataset.id;
        const post = cachedPosts.find(function(p) { return String(p._id) === String(id); });
        if (!post) return;
        openPostDetailModal(post, true);
      });

      fetch('/api/my-posts')
        .then(function(res) { return res.json(); })
        .then(function(posts) {
          cachedPosts = Array.isArray(posts) ? posts : [];
          if (cachedPosts.length === 0) {
            grid.innerHTML = '<p>아직 내가 쓴 글이 없어요.</p>';
            return;
          }
          grid.innerHTML = cachedPosts.map(function(p) {
            return '<div class="grid-item" data-id="' + p._id + '"><div class="grid-title">' + escapeHtml(p.title || '(제목 없음)') + '</div></div>';
          }).join('');
        })
        .catch(function(err) {
          console.error(err);
          grid.innerHTML = '<p>내 게시글을 불러오지 못했어요.</p>';
        });
    })();
  </script>

  <!-- 게시글 상세 + 댓글 모달 (메인 피드와 동일 구조) -->
  <div id="postDetailModal" class="post-detail-modal">
    <div class="post-detail-backdrop" id="postDetailModalClose"></div>
    <div class="post-detail-panel">
      <button type="button" class="modal-close" id="postDetailModalX" aria-label="닫기">×</button>
      <div class="post-detail-body" id="postDetailBody"></div>
      <div class="comments-section">
        <h4>댓글 <span id="commentCountMypage">0</span>개</h4>
        <div class="comment-list" id="commentListMypage"></div>
        <div class="comment-form">
          <textarea id="commentInputMypage" placeholder="댓글을 입력하세요"></textarea>
          <button type="button" id="commentSubmitMypage">등록</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 프로필 수정 모달: 상태메시지 + 프로필 사진 (mypage.js에서 처리) -->
  <div id="profileModal" class="modal" style="display:none;">
    <div class="modal-backdrop" id="profileModalClose"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="profileModalTitle">
      <button class="modal-x" id="profileModalX" type="button">×</button>
      <h3 id="profileModalTitle" style="margin-top:0;">프로필 수정</h3>
      <label for="statusInput" style="display:block; margin:10px 0 6px;">상태 메세지</label>
      <input id="statusInput" type="text"
        style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #ccc; border-radius:8px;" />
      <label for="profileFile" style="display:block; margin:12px 0 6px;">프로필 사진</label>
      <input id="profileFile" type="file" accept="image/*" />
      <div style="text-align:right; margin-top:14px;">
        <button id="saveProfileBtn" type="button" class="edit-btn">저장</button>
      </div>
    </div>
  </div>

  <!-- 일정 추가/수정 모달 -->
  <div id="scheduleModal" class="modal" style="display:none;">
    <div class="modal-backdrop" id="scheduleModalClose"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="scheduleModalTitle">
      <button class="modal-x" id="scheduleModalX" type="button">×</button>
      <h3 id="scheduleModalTitle" style="margin-top:0;">일정</h3>
      <input type="hidden" id="scheduleId" />
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <div style="flex:1; min-width:220px;">
          <label style="display:block; margin:10px 0 6px;">제목</label>
          <input id="scheduleTitle" type="text" placeholder="예: QT 모임"
            style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #ccc; border-radius:8px;" />
        </div>
        <div style="width:140px; min-width:140px;">
          <label style="display:block; margin:10px 0 6px;">색상</label>
          <input id="scheduleColor" type="color" value="#ffcd38" style="width:100%; height:42px; padding:0; border:1px solid #ccc; border-radius:8px;" />
        </div>
      </div>
      <label style="display:flex; align-items:center; gap:8px; margin-top:10px;">
        <input id="scheduleAllDay" type="checkbox" />
        하루 종일
      </label>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <div style="flex:1; min-width:220px;">
          <label style="display:block; margin:10px 0 6px;">시작</label>
          <input id="scheduleStart" type="datetime-local"
            style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #ccc; border-radius:8px;" />
        </div>
        <div style="flex:1; min-width:220px;">
          <label style="display:block; margin:10px 0 6px;">끝</label>
          <input id="scheduleEnd" type="datetime-local"
            style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #ccc; border-radius:8px;" />
        </div>
      </div>
      <label style="display:block; margin:10px 0 6px;">메모</label>
      <textarea id="scheduleDesc" rows="4" placeholder="설명/장소/링크 등"
        style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #ccc; border-radius:8px; resize:vertical;"></textarea>
      <div style="display:flex; justify-content:space-between; gap:10px; margin-top:14px;">
        <button id="deleteScheduleBtn" type="button" class="edit-btn danger" style="display:none;">삭제</button>
        <div style="margin-left:auto; display:flex; gap:8px;">
          <button id="cancelScheduleBtn" type="button">취소</button>
          <button id="saveScheduleBtn" type="button" class="edit-btn">저장</button>
        </div>
      </div>
      <div style="margin-top:10px; color:#666; font-size:12px;">
        * 마이페이지에서는 내 일정만 추가/수정/삭제할 수 있어요.
      </div>
    </div>
  </div>

  <script src="/js/mypage.js"></script>
  <script src="/js/group-panel.js"></script>
  </div><!-- #pjax-container -->
  <script src="/js/chat.js"></script>
  <script src="/js/pjax.js"></script>
</body>
</html>
